name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # windows-latest included deliberately: the daemon/stop lifecycle has
        # Windows-specific process-tree behavior that ubuntu alone won't catch.
        os: [ubuntu-latest, windows-latest]
        node: [22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── CLI package ──────────────────────────────────────────
      - name: Lint CLI (type-check)
        working-directory: packages/cli
        run: npx tsc --noEmit

      - name: Build CLI
        working-directory: packages/cli
        run: npm run build

      - name: Smoke test CLI (init → watch → edit → stop → revert)
        working-directory: packages/cli
        run: npm run smoke

      # ── Web app ──────────────────────────────────────────────
      - name: Build Web
        if: matrix.os == 'ubuntu-latest'
        working-directory: apps/web
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
