name: Publish Extension

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    name: Publish VS Code Extension
    runs-on: ubuntu-latest
    # Only run if the release tag starts with "extension-v"
    if: startsWith(github.event.release.tag_name, 'extension-v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Extension (esbuild)
        working-directory: packages/extension
        run: npm run build

      - name: Package .vsix
        working-directory: packages/extension
        run: npx @vscode/vsce package --no-dependencies

      - name: Publish to VS Code Marketplace
        working-directory: packages/extension
        run: npx @vscode/vsce publish --no-dependencies
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: backspace-timeline.vsix
          path: packages/extension/*.vsix
