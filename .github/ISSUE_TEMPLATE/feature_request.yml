name: Feature Request
description: Suggest an idea for Backspace
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a new feature!
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this solve? Why is this needed?
      placeholder: "When I use AI tool X, I want to..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would it work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you think about?
  - type: textarea
    id: use-case
    attributes:
      label: Daily Use Case
      description: How often would you use this and in what workflow?
