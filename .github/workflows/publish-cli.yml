name: Publish CLI

on:
  release:
    types: [published]
  # Manual escape hatch: publish the current package.json version from main.
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # Required for npm provenance

jobs:
  publish:
    name: Publish backspace-ai to npm
    runs-on: ubuntu-latest
    # Release-triggered runs only fire for CLI release tags (cli-vX.Y.Z)
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'cli-v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Verify tag matches package version
        if: github.event_name == 'release'
        working-directory: packages/cli
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ github.event.release.tag_name }}"
          TAG_VERSION="${TAG_VERSION#cli-v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Release tag cli-v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      # prepublishOnly runs lint + build again as a final gate
      - name: Publish with provenance
        working-directory: packages/cli
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
